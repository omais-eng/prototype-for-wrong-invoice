version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: airp_postgres
    environment:
      POSTGRES_USER: airp
      POSTGRES_PASSWORD: airp_pass
      POSTGRES_DB: airp_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airp -d airp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: airp_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-erp:
    build:
      context: ./mock-erp
      dockerfile: Dockerfile
    container_name: airp_mock_erp
    ports:
      - "8010:8001"
    environment:
      - PORT=8001

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: airp_backend
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://airp:airp_pass@postgres:5432/airp_db
      - REDIS_URL=redis://redis:6379
      - MOCK_ERP_URL=http://mock-erp:8001
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@airp.local}
      - IMAP_HOST=${IMAP_HOST:-}
      - IMAP_USER=${IMAP_USER:-}
      - IMAP_PASS=${IMAP_PASS:-}
      - SECRET_KEY=${SECRET_KEY:-airp-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-erp:
        condition: service_started
    volumes:
      - invoice_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: airp_frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  invoice_uploads:
